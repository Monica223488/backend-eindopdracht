spring.application.name=eindopdrachtBackend

# datasource PostgreSGL
spring.sql.init.platform=postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/eindopdrachtBackend
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa
spring.jpa.database=postgresql
spring.jpa.show-sql=true

# generate schema ddl to create tables (update nog weer aanpassen naar create)
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create

# database initialization with data.sql after hibernate
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

photo.storage.dir=./data/photos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB



